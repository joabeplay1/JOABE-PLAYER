// ── LocalStorage Store ────────────────────────────────────────────────────────
const genId = () => Date.now().toString(36) + Math.random().toString(36).slice(2);
const getCol = (n) => { try { return JSON.parse(localStorage.getItem('germiani_'+n)||'[]'); } catch { return []; } };
const saveCol = (n, d) => localStorage.setItem('germiani_'+n, JSON.stringify(d));
const makeStore = (name) => ({
  list(sf='-created_date',lim=100){ let d=getCol(name); const desc=sf.startsWith('-'); const f=sf.replace(/^-/,''); d.sort((a,b)=>{const va=a[f]??'',vb=b[f]??''; return desc?(va<vb?1:-1):(va>vb?1:-1);}); return d.slice(0,lim); },
  filter(q){ return getCol(name).filter(i=>Object.entries(q).every(([k,v])=>i[k]===v)); },
  get(id){ return getCol(name).find(i=>i.id===id)||null; },
  create(r){ const d=getCol(name); const n={...r,id:genId(),created_date:new Date().toISOString(),updated_date:new Date().toISOString()}; d.push(n); saveCol(name,d); return n; },
  update(id,c){ const d=getCol(name); const i=d.findIndex(x=>x.id===id); if(i<0) throw new Error('not found'); d[i]={...d[i],...c,updated_date:new Date().toISOString()}; saveCol(name,d); return d[i]; },
  delete(id){ saveCol(name,getCol(name).filter(i=>i.id!==id)); },
});
const db = { projects:makeStore('projects'), executions:makeStore('executions'), settings:makeStore('settings') };
const getSettings = () => db.settings.list()[0]||null;
const saveSettings = (data) => { const e=getSettings(); return e?db.settings.update(e.id,data):db.settings.create(data); };

// ── GitHub API ────────────────────────────────────────────────────────────────
const API = 'https://api.github.com';
const gh = (t) => ({ Authorization:'token '+t, Accept:'application/vnd.github.v3+json', 'Content-Type':'application/json' });
const toB64 = (str) => { try { return btoa(unescape(encodeURIComponent(str))); } catch { return btoa(str); } };

const ghApi = {
  async testConnection(token, username) {
    const r = await fetch(API+'/user', {headers:gh(token)});
    if (!r.ok) throw new Error('Token inválido ou expirado');
    const d = await r.json(); return d;
  },
  async ensureRepo(token, owner, repo) {
    const r = await fetch(API+'/repos/'+owner+'/'+repo, {headers:gh(token)});
    if (r.ok) return r.json();
    const c = await fetch(API+'/user/repos', {method:'POST',headers:gh(token),body:JSON.stringify({name:repo,private:false,auto_init:true,description:'Germiani IA Studio'})});
    if (!c.ok) { const e=await c.json(); throw new Error(e.message||'Não foi possível criar o repositório'); }
    return c.json();
  },
  async listRepos(token) {
    const r = await fetch(API+'/user/repos?per_page=100&sort=updated', {headers:gh(token)});
    if (!r.ok) throw new Error('Erro ao listar repositórios');
    return r.json();
  },
  async getFileSha(token, owner, repo, branch, path) {
    const r = await fetch(API+'/repos/'+owner+'/'+repo+'/contents/'+path+'?ref='+branch, {headers:gh(token)});
    if (r.ok) { const d=await r.json(); return d.sha; } return null;
  },
  async putFile(token, owner, repo, branch, path, content, sha) {
    const body = {message:'update '+path, content, branch}; if (sha) body.sha = sha;
    const r = await fetch(API+'/repos/'+owner+'/'+repo+'/contents/'+path, {method:'PUT',headers:gh(token),body:JSON.stringify(body)});
    if (!r.ok) { const e=await r.json(); throw new Error(e.message||'Erro ao enviar '+path); }
    return r.json();
  },
  async enablePages(token, owner, repo) {
    try { await fetch(API+'/repos/'+owner+'/'+repo+'/pages', {method:'POST',headers:gh(token),body:JSON.stringify({source:{branch:'main',path:'/'}}) }); } catch {}
  },
  async fileToBase64(file) {
    return new Promise((res,rej)=>{ const rd=new FileReader(); rd.onload=()=>res(rd.result.split(',')[1]); rd.onerror=rej; rd.readAsDataURL(file); });
  },
};

// ── Upload Project ────────────────────────────────────────────────────────────
function UploadProject() {
  const [settings,setSettings]=useState(null);
  const [files,setFiles]=useState([]);
  const [projectName,setProjectName]=useState('');
  const [step,setStep]=useState('select');
  const [progress,setProgress]=useState(0);
  const [currentFile,setCurrentFile]=useState('');
  const [logs,setLogs]=useState([]);
  const [error,setError]=useState('');
  const ref=useRef(null);
  useEffect(()=>{ const s=getSettings(); if(s) setSettings(s); },[]);
  const addLog=(msg,type='info')=>setLogs(p=>[...p,{msg,type,time:new Date().toLocaleTimeString('pt-BR')}]);
  const onFolder=e=>{ const fl=Array.from(e.target.files); if(!fl.length) return; setFiles(fl); const fp=fl[0].webkitRelativePath||fl[0].name; if(!projectName) setProjectName(fp.split('/')[0]); };
  const upload=async()=>{
    if(!settings?.github_token){setError('Configure o GitHub Token primeiro'); return;}
    if(!files.length){setError('Selecione uma pasta'); return;}
    setStep('uploading'); setProgress(0); setLogs([]); setError('');
    const {github_token:tk,github_username:owner,default_repo:repo,default_branch:branch='main',default_workflow:wf='build.yml'}=settings;
    try{
      addLog('Testando conexão...'); await ghApi.testConnection(tk,owner); addLog('✓ Conexão OK','success');
      addLog('Verificando repo...'); await ghApi.ensureRepo(tk,owner,repo); addLog('✓ Repo pronto','success');
      const proj=db.projects.create({name:projectName||'Projeto',status:'uploading',repo_owner:owner,repo_name:repo,branch,workflow_name:wf,file_count:files.length,total_size:files.reduce((a,f)=>a+f.size,0)});
      addLog('Enviando '+files.length+' arquivos...');
      for(let i=0;i<files.length;i++){
        const f=files[i]; const rp=(f.webkitRelativePath||f.name).split('/').slice(1).join('/')||(f.webkitRelativePath||f.name);
        setCurrentFile(rp); setProgress(Math.round((i/files.length)*90));
        try{ const b64=await ghApi.fileToBase64(f); const sha=await ghApi.getFileSha(tk,owner,repo,branch,rp); await ghApi.putFile(tk,owner,repo,branch,rp,b64,sha); addLog('✓ '+rp,'success'); }
        catch(e){ addLog('✗ '+rp+': '+e.message,'error'); }
      }
      setProgress(100); setStep('done'); addLog('✓ Finalizado!','success');
      db.projects.update(proj.id,{status:'uploaded'});
    }catch(e){ setError(e.message); addLog('Erro: '+e.message,'error'); setStep('select'); }
  };
  const reset=()=>{setStep('select');setFiles([]);setProjectName('');setProgress(0);setLogs([]);setError('');};
  return React.createElement('div',{style:{maxWidth:640}},
    React.createElement('h1',{style:{color:'white',fontSize:20,fontWeight:700,margin:'0 0 20px'}},'📤 Enviar Projeto'),
    !settings?.github_token&&React.createElement('div',{style:{background:'rgba(251,191,36,0.1)',border:'1px solid rgba(251,191,36,0.3)',borderRadius:12,padding:16,color:'#fbbf24',fontSize:13,marginBottom:16}},'Configure as chaves primeiro. ',React.createElement('a',{href:'#/keys',style:{color:'#fbbf24',textDecoration:'underline'}},'Ir para Chaves')),
    error&&React.createElement('div',{style:{background:'rgba(248,113,113,0.1)',border:'1px solid rgba(248,113,113,0.3)',borderRadius:12,padding:16,color:'#f87171',fontSize:13,marginBottom:16}},error),
    step==='select'&&React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:14}},
      React.createElement('div',null,React.createElement('label',{style:C.lbl},'Nome do Projeto'),React.createElement('input',{style:C.inp,value:projectName,onChange:e=>setProjectName(e.target.value),placeholder:'Meu Projeto'})),
      React.createElement('div',null,
        React.createElement('label',{style:C.lbl},'Pasta do Projeto'),
        React.createElement('input',{ref,type:'file',webkitdirectory:'',directory:'',multiple:true,onChange:onFolder,style:{display:'none'}}),
        React.createElement('button',{onClick:()=>ref.current?.click(),style:{width:'100%',background:'#111827',border:'1px dashed #374151',borderRadius:12,padding:40,color:'#9ca3af',cursor:'pointer',fontSize:13}},'📁 Selecionar Pasta')),
      files.length>0&&React.createElement('div',{style:C.card},
        React.createElement('p',{style:{color:'white',fontSize:13,fontWeight:500,margin:'0 0 8px'}},files.length+' arquivos selecionados'),
        React.createElement('div',{style:{maxHeight:100,overflowY:'auto'}},files.slice(0,20).map((f,i)=>React.createElement('div',{key:i,style:{color:'#9ca3af',fontSize:11,fontFamily:'monospace',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},f.webkitRelativePath||f.name)))),
      React.createElement('button',{onClick:upload,disabled:!files.length||!settings?.github_token,style:{...C.btn(),width:'100%',justifyContent:'center'}},'📤 Enviar para o GitHub')),
    (step==='uploading'||step==='done')&&React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:14}},
      React.createElement('div',{style:C.card},
        React.createElement('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:8}},
          React.createElement('span',{style:{color:'white',fontSize:13}},step==='done'?'✅ Concluído':'Enviando...'),
          React.createElement('span',{style:{color:'#a78bfa',fontSize:13}},progress+'%')),
        React.createElement(ProgressBar,{value:progress}),
        currentFile&&step==='uploading'&&React.createElement('p',{style:{color:'#6b7280',fontSize:11,fontFamily:'monospace',margin:'6px 0 0'}},currentFile)),
      React.createElement(LogPanel,{logs}),
      step==='done'&&React.createElement('div',{style:{display:'flex',gap:10}},
        React.createElement('button',{onClick:reset,style:{...C.btnOut,flex:1}},'Novo Envio'),
        React.createElement('a',{href:'#/history',style:{...C.btn(),flex:1,textDecoration:'none',textAlign:'center',justifyContent:'center'}},'Ver Projetos'))));
}

// ── Project History ───────────────────────────────────────────────────────────
function ProjectHistory() {

// ── Export (GitHub Pages) ─────────────────────────────────────────────────────
function ExportPage() {
  const [repoName,setRepoName]=useState('germiani-ia-studio');
  const [step,setStep]=useState('config');
  const [progress,setProgress]=useState(0);
  const [logs,setLogs]=useState([]);
  const [repoUrl,setRepoUrl]=useState('');
  const [pagesUrl,setPagesUrl]=useState('');
  const [error,setError]=useState('');
  const [report,setReport]=useState(null);
  const [userRepos,setUserRepos]=useState([]);
  const [loadingRepos,setLoadingRepos]=useState(false);
  const [showRepos,setShowRepos]=useState(false);
  const [mode,setMode]=useState('pages');
  const [localFiles,setLocalFiles]=useState([]);
  const folderRef=useRef(null);
  const settings=getSettings();
  const hasToken=!!settings?.github_token;
  const addLog=(msg,type='info')=>setLogs(p=>[...p,{msg,type,time:new Date().toLocaleTimeString('pt-BR')}]);

  const loadRepos=async()=>{
    if(!hasToken) return; setLoadingRepos(true);
    try{ const r=await ghApi.listRepos(settings.github_token); setUserRepos(r); setShowRepos(true); }
    catch(e){ setError(e.message); }
    setLoadingRepos(false);
  };

  const handleSend=async()=>{
    if(!hasToken){setError('Configure o GitHub Token nas Chaves'); return;}
    if(!repoName.trim()){setError('Informe o repositório'); return;}
    if(mode==='files'&&localFiles.length===0){setError('Selecione uma pasta'); return;}
    setStep('sending'); setProgress(0); setLogs([]); setError(''); setReport(null);
    const {github_token:token,github_username:owner}=settings; const branch='main';
    try{
      addLog('Testando conexão...'); await ghApi.testConnection(token,owner); addLog('✓ Conexão OK','success'); setProgress(10);
      addLog('Verificando repositório...'); const repo=await ghApi.ensureRepo(token,owner,repoName); setRepoUrl(repo.html_url); addLog('✓ Repo: '+repo.html_url,'success'); setProgress(18);
      let manifest={};
      if(mode==='pages'){
        manifest={
          'index.html': document.documentElement.outerHTML,
          '.nojekyll': '',
          'README.md': '# Germiani IA Studio\n\nAcesse: https://'+owner+'.github.io/'+repoName
        };
      } else {
        for(const f of localFiles){ const rel=f.webkitRelativePath||f.name; const path=rel.split('/').slice(1).join('/')||rel; manifest[path]=f; }
      }
      const paths=Object.keys(manifest); addLog('Enviando '+paths.length+' arquivos...');
      let uploaded=0,failed=0,failedFiles=[];
      for(let i=0;i<paths.length;i++){
        const fp=paths[i]; const content=manifest[fp];
        setProgress(18+Math.round((i/paths.length)*70));
        try{
          const b64=typeof content==='string'?toB64(content):await ghApi.fileToBase64(content);
          const sha=await ghApi.getFileSha(token,owner,repoName,branch,fp);
          await ghApi.putFile(token,owner,repoName,branch,fp,b64,sha);
          addLog('✓ '+fp,'success'); uploaded++;
        }catch(e){ addLog('✗ '+fp+': '+e.message,'error'); failed++; failedFiles.push(fp); }
      }
      setProgress(92);
      if(mode==='pages'){ addLog('Ativando GitHub Pages...'); await ghApi.enablePages(token,owner,repoName); addLog('✓ Pages ativado','success'); }
      setProgress(100);
      const pu=mode==='pages'?'https://'+owner+'.github.io/'+repoName:null;
      if(pu) setPagesUrl(pu);
      setReport({total:paths.length,uploaded,failed,failedFiles,success:failed===0});
      addLog(failed===0?'✅ Concluído!':'⚠ Concluído com erros',failed===0?'success':'error');
      setStep('done');
    }catch(e){ setError(e.message); addLog('Erro: '+e.message,'error'); setStep('config'); }
  };

  const reset=()=>{setStep('config');setReport(null);setLogs([]);setError('');setProgress(0);setLocalFiles([]);setPagesUrl('');};

  return React.createElement('div',{style:{maxWidth:680,display:'flex',flexDirection:'column',gap:20}},
    React.createElement('div',null,
      React.createElement('h1',{style:{color:'white',fontSize:20,fontWeight:700,margin:0}},'🚀 Enviar App p/ GitHub'),
      React.createElement('p',{style:{color:'#9ca3af',fontSize:13,margin:'4px 0 0'}},'Novo ou existente — GitHub Pages ou envio de arquivos')),
    !hasToken&&React.createElement('div',{style:{background:'rgba(251,191,36,0.1)',border:'1px solid rgba(251,191,36,0.3)',borderRadius:12,padding:14,color:'#fbbf24',fontSize:13}},
      '⚠ Configure o GitHub Token. ',React.createElement('a',{href:'#/keys',style:{color:'#fbbf24',textDecoration:'underline'}},'Ir para Chaves')),
    error&&React.createElement('div',{style:{background:'rgba(248,113,113,0.1)',border:'1px solid rgba(248,113,113,0.3)',borderRadius:12,padding:14,color:'#f87171',fontSize:13}},error),
    step==='config'&&React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:14}},
      React.createElement('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}},
        [['pages','🌐 GitHub Pages','App completo via CDN'],['files','📁 Enviar Pasta','Arquivos locais p/ repo']].map(([m,t,s])=>
          React.createElement('button',{key:m,onClick:()=>setMode(m),style:{padding:'14px 12px',borderRadius:12,border:'1px solid '+(mode===m?'rgba(124,58,237,0.5)':'#1f2937'),background:mode===m?'rgba(124,58,237,0.15)':'#111827',color:mode===m?'#c4b5fd':'#9ca3af',cursor:'pointer',textAlign:'left'}},
            React.createElement('div',{style:{fontWeight:600,fontSize:13,marginBottom:4}},t),
            React.createElement('div',{style:{fontSize:11,opacity:0.75}},s)))),
      React.createElement('div',{style:{...C.card,padding:18,display:'flex',flexDirection:'column',gap:12}},
        React.createElement('div',null,
          React.createElement('label',{style:C.lbl},'Repositório (novo ou existente)'),
          React.createElement('div',{style:{display:'flex',gap:8}},
            React.createElement('input',{style:{...C.inp,flex:1},value:repoName,onChange:e=>setRepoName(e.target.value),placeholder:'nome-do-repo'}),
            React.createElement('button',{onClick:loadRepos,disabled:!hasToken||loadingRepos,style:{...C.btnOut,flexShrink:0}},loadingRepos?'..':'📋 Meus Repos')),
          settings?.github_username&&React.createElement('p',{style:{color:'#6b7280',fontSize:12,marginTop:4}},'github.com/'+settings.github_username+'/'+repoName)),
        showRepos&&userRepos.length>0&&React.createElement('div',{style:{background:'#1f2937',borderRadius:8,maxHeight:180,overflowY:'auto'}},
          React.createElement('div',{style:{display:'flex',justifyContent:'space-between',padding:'8px 12px',borderBottom:'1px solid #374151'}},
            React.createElement('span',{style:{color:'#9ca3af',fontSize:12}},'Seus repos ('+userRepos.length+')'),
            React.createElement('button',{onClick:()=>setShowRepos(false),style:{background:'none',border:'none',color:'#9ca3af',cursor:'pointer'}},'✕')),
          userRepos.map(r=>React.createElement('button',{key:r.id,onClick:()=>{setRepoName(r.name);setShowRepos(false);},style:{width:'100%',textAlign:'left',padding:'9px 12px',background:'transparent',border:'none',color:'#e5e7eb',cursor:'pointer',fontSize:13,borderBottom:'1px solid #1f2937',display:'flex',justifyContent:'space-between'}},
            r.name,React.createElement('span',{style:{color:'#6b7280',fontSize:11}},r.private?'🔒':'🌐')))),
        mode==='files'&&React.createElement('div',null,
          React.createElement('input',{ref:folderRef,type:'file',webkitdirectory:'',directory:'',multiple:true,onChange:e=>setLocalFiles(Array.from(e.target.files)),style:{display:'none'}}),
          React.createElement('button',{onClick:()=>folderRef.current?.click(),style:{width:'100%',background:'#1f2937',border:'1px dashed #374151',borderRadius:8,padding:'20px',color:'#9ca3af',cursor:'pointer',fontSize:13}},localFiles.length>0?localFiles.length+' arquivos selecionados':'📁 Selecionar Pasta'))),
      React.createElement('button',{onClick:handleSend,disabled:!hasToken||!repoName||(mode==='files'&&localFiles.length===0),style:{...C.btn(),width:'100%',justifyContent:'center',padding:'12px 20px',fontSize:14}},mode==='pages'?'🚀 Publicar no GitHub Pages':'📤 Enviar Arquivos')),
    (step==='sending'||step==='done')&&React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:14}},
      React.createElement('div',{style:C.card},
        React.createElement('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:8}},
          React.createElement('span',{style:{color:'white',fontSize:13}},step==='done'?(report?.success?'✅ Concluído!':'⚠ Com erros'):'Enviando...'),
          React.createElement('span',{style:{color:'#a78bfa',fontSize:13}},progress+'%')),
        React.createElement(ProgressBar,{value:progress})),
      React.createElement(LogPanel,{logs}),
      report&&React.createElement('div',{style:{...C.card,background:report.success?'rgba(52,211,153,0.08)':'rgba(251,191,36,0.08)',border:'1px solid '+(report.success?'rgba(52,211,153,0.3)':'rgba(251,191,36,0.3)')}},
        React.createElement('div',{style:{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:report.failedFiles.length?12:0}},
          [['Total',report.total,'white'],['Enviados',report.uploaded,'#34d399'],['Falhas',report.failed,report.failed>0?'#f87171':'#6b7280']].map(([l,v,c])=>
            React.createElement('div',{key:l,style:{background:'rgba(0,0,0,0.2)',borderRadius:8,padding:10,textAlign:'center'}},
              React.createElement('p',{style:{color:c,fontSize:20,fontWeight:700,margin:0}},v),
              React.createElement('p',{style:{color:'#9ca3af',fontSize:11,margin:0}},l))),
        ),
        report.failedFiles.length>0&&report.failedFiles.map(f=>React.createElement('p',{key:f,style:{color:'#fca5a5',fontSize:11,fontFamily:'monospace',margin:'2px 0'}},f))),
      pagesUrl&&React.createElement('div',{style:{...C.card,background:'rgba(52,211,153,0.08)',border:'1px solid rgba(52,211,153,0.3)'}},
        React.createElement('p',{style:{color:'#34d399',fontWeight:600,fontSize:14,margin:'0 0 8px'}},'🌐 App publicado em:'),
        React.createElement('a',{href:pagesUrl,target:'_blank',style:{color:'#a78bfa',fontSize:13,fontFamily:'monospace',wordBreak:'break-all'}},pagesUrl),
        React.createElement('p',{style:{color:'#6b7280',fontSize:12,marginTop:8,marginBottom:0}},'⏳ Pode levar 1–3 min no primeiro deploy.')),
      step==='done'&&React.createElement('button',{onClick:reset,style:{...C.btnOut,width:'100%'}},'Novo Envio')));
}
